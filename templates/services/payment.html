{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white py-3">
                <h4 class="mb-0"><i class="fas fa-lock me-2"></i>Secure Payment</h4>
            </div>
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <p class="text-secondary mb-1">Total Amount</p>
                    <h2 class="fw-bold text-dark">${{ amount_display }}</h2>
                    <p class="small text-secondary">{{ bookings.count }} Services in Cart</p>
                </div>

                <hr>

                <div class="d-grid gap-2">
                    <button id="rzp-button1" class="btn btn-success btn-lg shadow-sm">
                        Pay with Razorpay
                    </button>
                </div>
            </div>
        </div>
        <div class="text-center mt-3">
            <i class="fas fa-shield-alt text-success me-1"></i>
            <span class="text-secondary small">Payments are processed securely via Razorpay</span>
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var rzp_amount = parseInt("{{ amount }}");
    var rzp_key = "{{ razorpay_key_id }}";
    var rzp_order = "{{ razorpay_order_id }}";
    var rzp_callback = "{{ callback_url }}";

    var options = {
        "key": rzp_key,
        "amount": rzp_amount,
        "currency": "INR",
        "name": "ServiceSpot",
        "description": "Payment for {{ bookings.count }} Services",
        "order_id": rzp_order,
        "callback_url": rzp_callback,
        "redirect": true,
        "prefill": {
            "name": "{{ cart.user.get_full_name|default:cart.user.username }}",
            "email": "{{ cart.user.email }}",
            "contact": "9999999999"
        },
        "theme": {
            "color": "#198754"
        },
        "modal": {
            "ondismiss": function () {
                console.log("--- Checkout Closed ---");
            }
        }
    };

    console.log("Razorpay Initializing with Options:", JSON.stringify(options, null, 2));

    try {
        var rzp1 = new Razorpay(options);

        rzp1.on('payment.failed', function (response) {
            console.error("--- Razorpay Payment Failed ---");
            console.error("Code:", response.error.code);
            console.error("Description:", response.error.description);
            alert("Payment Failed: " + response.error.description);
        });

        document.getElementById('rzp-button1').onclick = function (e) {
            console.log("--- Opening Razorpay Modal ---");
            rzp1.open();
            e.preventDefault();
        };

        console.log("--- Razorpay Initialized Successfully ---");
    } catch (err) {
        console.error("--- Razorpay Init Error ---", err);
        alert("Payment system failed to load: " + err.message);
    }
</script>
{% endblock %}
