{% extends 'layouts/base.html' %}

{% block content %}

<div class="min-h-screen bg-black text-white flex items-center justify-center px-6">


    <div class="w-full max-w-2xl bg-white/5 border border-white/10 rounded-3xl p-10 backdrop-blur-xl">
        <div class="mb-8">
            <h1 class="text-4xl font-bold mb-3">
                Complete Your Subscription
            </h1>

            <p class="text-white/70">
                You're subscribing to the
                <span class="font-semibold text-teal-400">
                    {{ plan.name }}
                </span>
                plan.
            </p>
        </div>

        <div class="bg-black/30 border border-white/10 rounded-2xl p-6 mb-8">

            <div class="flex items-center justify-between mb-4">
                <span class="text-white/70">
                    Plan
                </span>

                <span class="font-semibold">
                    {{ plan.name }}
                </span>
            </div>

            <div class="flex items-center justify-between mb-4">
                <span class="text-white/70">
                    Credits
                </span>

                <span class="font-semibold">
                    {{ plan.credits }}
                </span>
            </div>

            <div class="flex items-center justify-between pt-4 border-t border-white/10">
                <span class="text-lg font-semibold">
                    Total
                </span>

                <span class="text-2xl font-bold text-teal-400">
                    ₹{{ amount_display }}
                </span>
            </div>
        </div>
        <button id="rzp-button"
            class="w-full bg-teal-500 hover:bg-teal-400 text-black font-semibold py-4 rounded-2xl transition duration-300">
            Pay Now
        </button>
        <div class="mt-6 text-center text-sm text-white/50">
            Secure payments powered by Razorpay
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

    const options = {
        key: "{{ razorpay_key_id }}",
        amount: "{{ amount }}",
        currency: "INR",
        name: "AI Sidekick",
        description: "{{ plan.name }} Subscription",
        order_id: "{{ razorpay_order_id }}",
        callback_url: "{{ callback_url }}",
        prefill: {
            name: "{{ request.user.username }}",
            email: "{{ request.user.email }}"
        },
        theme: {
            color: "#14b8a6"
        }
    };
    const rzp = new Razorpay(options);
    document.getElementById('rzp-button').onclick = function (e) {
        rzp.open();
        e.preventDefault();
    }
</script>
{% endblock %}
